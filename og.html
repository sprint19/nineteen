<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="robots" content="noindex,nofollow">
<!-- Generator template for assets/og-image.png (1200x630). Not part of the site. -->
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:1200px; height:630px; overflow:hidden; }
  body {
    background:#05060a;
    font-family:"VT323", monospace;
    color:#c7d2c4;
    position:relative;
    display:flex; flex-direction:column;
    justify-content:center; align-items:center;
    text-align:center;
  }
  .stars {
    position:absolute; inset:0;
    background:
      radial-gradient(2px 2px at 12% 18%, #fff, transparent),
      radial-gradient(2px 2px at 80% 12%, #9cc1ff, transparent),
      radial-gradient(1.5px 1.5px at 25% 70%, #fff, transparent),
      radial-gradient(2px 2px at 65% 80%, #fff, transparent),
      radial-gradient(1.5px 1.5px at 90% 55%, #bcd, transparent),
      radial-gradient(2px 2px at 40% 30%, #fff, transparent),
      radial-gradient(1.5px 1.5px at 55% 60%, #fff, transparent),
      radial-gradient(2px 2px at 8% 85%, #9cc1ff, transparent),
      radial-gradient(1.5px 1.5px at 72% 38%, #fff, transparent);
    opacity:.7;
  }
  .frame {
    position:absolute; inset:18px;
    border:2px solid rgba(87,224,138,.35);
    pointer-events:none;
  }
  .tl, .tr { position:absolute; top:34px; font-size:20px; letter-spacing:.15em; color:#2f7a4d; }
  .tl { left:42px; text-align:left; line-height:1.5; }
  .tr { right:42px; color:#a87f15; }
  .ep { font-size:22px; letter-spacing:.4em; color:#57e08a; margin-bottom:26px; }
  h1 {
    font-family:"Press Start 2P", monospace;
    font-size:74px; line-height:1.15; color:#e8b21f;
    text-shadow:0 0 24px rgba(232,178,31,.5);
    letter-spacing:2px;
  }
  .arch {
    font-family:"Press Start 2P", monospace;
    font-size:28px; color:#c7d2c4; letter-spacing:10px;
    margin:24px 0 30px;
  }
  .sub { font-size:30px; color:#c7d2c4; line-height:1.4; max-width:900px; }
  .domain {
    margin-top:34px; font-size:26px; letter-spacing:.12em;
    color:#57e08a; border:2px solid rgba(232,178,31,.45);
    padding:10px 26px; color:#e8b21f;
  }
  .status { position:absolute; bottom:40px; left:42px; right:42px;
    display:flex; justify-content:space-between; font-size:20px; color:#5d6b5c; }
  .status .r { color:#a87f15; }
</style>
</head>
<body>
  <div class="stars"></div>
  <div class="frame"></div>
  <div class="tl">ARCHIVE PROTOCOL: 19-A<br>CLEARANCE LEVEL: WHATEVER<br>DATE: ??/??/?9</div>
  <div class="tr">[ UNVERIFIED DOCUMENT ]</div>

  <div class="ep">EPISODE XIX</div>
  <h1>SPRINT<br>NINETEEN</h1>
  <div class="arch">THE ARCHIVE</div>
  <div class="sub">The unnecessarily dramatic<br>spelling incident behind Sprint19.</div>
  <div class="domain">SPRINTNINETEEN.COM</div>

  <div class="status">
    <span>NOT A FRANCHISE. PROBABLY.</span>
    <span class="r">banana permission pending</span>
  </div>
</body>
</html>
